{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Create New Post - EchoNotes{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                    <h4 class="mb-0">Share Your Thoughts</h4>
                    <small id="word-count" class="text-white-50">0 words · 1 min read</small>
                </div>
                <div class="card-body">
                    <form method="POST" id="post-form">
                        {% csrf_token %}
                        {{ form|crispy }}
                        <div class="d-grid gap-2 mt-3">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-paper-plane me-2"></i>Publish Post
                            </button>
                            <a href="{% url 'profile-detail' user.username %}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
