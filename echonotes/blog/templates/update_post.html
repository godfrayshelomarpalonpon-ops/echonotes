{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Edit Post - EchoNotes{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Edit Your Post</h4>
                </div>
                <div class="card-body">
                    <form method="POST" id="post-form" action="{% url 'update-post' post.pk %}">
                        {% csrf_token %}
                        {{ form|crispy }}
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">Update Post</button>
                            <a href="{% url 'post-detail' post.pk %}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
